name: 功能建议
description: 提议直接改善跨平台模型调用/运行的功能
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述用户在 Windows、Linux、Android 或 ESP32 上调用/运行模型时遇到的具体问题。
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 目标平台
      multiple: true
      options:
        - Windows
        - Linux
        - Android
        - ESP32
        - 跨平台协议
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 最小解决方案
      description: 尽量只描述解决核心问题所需的最小能力、API 或工作流。
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: 兼容性与降级
      description: 是否改变 capabilities、HTTP、Schema、记忆或工具权限？旧客户端如何降级？
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 验收与测试建议
      description: 建议可验证的成功判据、设备和失败路径。
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: 范围确认
      options:
        - label: 该建议直接服务于跨平台调用或本地运行大模型。
          required: true
        - label: 若涉及 Agent，方案只调用预注册工具，不要求执行模型生成的任意代码。
          required: false

